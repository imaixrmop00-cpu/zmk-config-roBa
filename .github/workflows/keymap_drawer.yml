name: Draw Keymap

on:
  push:
    paths:
      - "config/roBa.keymap"

jobs:
  draw:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Parse keymap
        run: keymap parse config/*.keymap > keymap.yaml

      - name: Draw SVG
        run: keymap draw keymap.yaml > keymap.svg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keymap
          path: keymap.svg
