name: Generate keymap cheatsheet

on:
  push:
    branches: [main, master]
    paths:
      - 'config/roBa.keymap'
      - 'scripts/generate_cheatsheet.py'
      - '.github/workflows/cheatsheet.yml'
  workflow_dispatch:  # 手動実行も可能

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # gh-pagesへのpushに必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate cheatsheet
        run: |
          python scripts/generate_cheatsheet.py \
            config/roBa.keymap \
            dist/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: 'cheatsheet: auto-generate from ${{ github.sha }}'
          # 既存のgh-pagesブランチの内容を保持しつつ上書き
          keep_files: false
